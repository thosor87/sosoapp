name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      # Firestore-Regeln deployen (nur auf main)
      - name: Deploy Firestore rules via REST API
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        run: |
          pip install --quiet google-auth requests
          python3 - <<'PYEOF'
          import json, os, sys, requests
          import google.auth.transport.requests
          import google.oauth2.service_account

          sa  = json.loads(os.environ['FIREBASE_SA_JSON'])
          pid = os.environ['PROJECT_ID']
          rules = open('firestore.rules').read()

          creds = google.oauth2.service_account.Credentials.from_service_account_info(
              sa, scopes=[
                  'https://www.googleapis.com/auth/cloud-platform',
                  'https://www.googleapis.com/auth/firebase',
              ]
          )
          creds.refresh(google.auth.transport.requests.Request())
          hdrs = {'Authorization': 'Bearer ' + creds.token, 'Content-Type': 'application/json'}
          base = 'https://firebaserules.googleapis.com/v1/projects/' + pid

          # 1. GET current release to learn the exact field names the API uses
          r = requests.get(base + '/releases/cloud.firestore', headers=hdrs)
          print('GET release status:', r.status_code)
          print('GET release body:', r.text[:500])

          # 2. Create new ruleset
          r = requests.post(base + '/rulesets', headers=hdrs,
              json={'source': {'files': [{'name': 'firestore.rules', 'content': rules}]}})
          r.raise_for_status()
          new_ruleset = r.json()['name']
          print('Ruleset created:', new_ruleset)

          # 3. PATCH – try every plausible field-name variant until one works
          patch_url = base + '/releases/cloud.firestore'
          attempts = [
              {'rulesetName': new_ruleset},
              {'ruleset_name': new_ruleset},
              {'name': 'projects/' + pid + '/releases/cloud.firestore', 'rulesetName': new_ruleset},
              {'name': 'projects/' + pid + '/releases/cloud.firestore', 'ruleset_name': new_ruleset},
          ]
          for body in attempts:
              r = requests.patch(patch_url, headers=hdrs, json=body)
              print(f'PATCH {list(body.keys())} → {r.status_code}: {r.text[:200]}')
              if r.ok:
                  print('SUCCESS – Firestore rules deployed.')
                  sys.exit(0)

          print('All PATCH variants failed – see output above.')
          sys.exit(1)
          PYEOF

      # Live-Deployment (nur auf main)
      - name: Deploy to live channel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live

      # Preview-Deployment (für Pull Requests / Feature-Branches)
      - name: Deploy to preview channel
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: pr-${{ github.event.number }}
          expires: 7d
