name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # action-hosting-deploy legt den "Deploy Preview"-Check-Run an
      pull-requests: write # ... und postet die Preview-URL als PR-Kommentar
    env:
      # Exposed so deploy steps can be skipped when the secret is unavailable
      # (e.g. Dependabot PRs, which never receive repository secrets).
      FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      # Firestore-Regeln deployen (nur auf main)
      - name: Deploy Firestore rules via REST API
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        run: |
          pip install --quiet google-auth requests
          python3 - <<'PYEOF'
          import json, os, requests
          import google.auth.transport.requests
          import google.oauth2.service_account

          sa  = json.loads(os.environ['FIREBASE_SA_JSON'])
          pid = os.environ['PROJECT_ID']
          rules = open('firestore.rules').read()

          creds = google.oauth2.service_account.Credentials.from_service_account_info(
              sa, scopes=[
                  'https://www.googleapis.com/auth/cloud-platform',
                  'https://www.googleapis.com/auth/firebase',
              ]
          )
          creds.refresh(google.auth.transport.requests.Request())
          hdrs = {'Authorization': 'Bearer ' + creds.token, 'Content-Type': 'application/json'}
          base = 'https://firebaserules.googleapis.com/v1/projects/' + pid

          r = requests.post(base + '/rulesets', headers=hdrs,
              json={'source': {'files': [{'name': 'firestore.rules', 'content': rules}]}})
          r.raise_for_status()
          rs = r.json()['name']
          print('Ruleset created:', rs)

          requests.delete(base + '/releases/cloud.firestore', headers=hdrs).raise_for_status()

          r = requests.post(base + '/releases', headers=hdrs,
              json={'name': 'projects/' + pid + '/releases/cloud.firestore', 'rulesetName': rs})
          r.raise_for_status()
          print('Release updated:', r.json().get('rulesetName'))
          print('Firestore rules deployed successfully.')
          PYEOF

      # Live-Deployment (nur auf main)
      - name: Deploy to live channel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live

      # Preview-Deployment (für Pull Requests / Feature-Branches)
      # Übersprungen, wenn kein Service-Account-Secret vorhanden ist
      # (z. B. Dependabot-PRs) – der Build bleibt das Merge-Gate.
      - name: Deploy to preview channel
        if: github.event_name == 'pull_request' && env.FIREBASE_SA != ''
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: pr-${{ github.event.number }}
          expires: 7d
