name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      # Firestore-Regeln deployen (nur auf main)
      - name: Deploy Firestore rules via REST API
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        run: |
          pip install --quiet google-auth google-api-python-client
          python3 - <<'PYEOF'
          import json, os
          import google.oauth2.service_account
          from googleapiclient.discovery import build

          sa  = json.loads(os.environ['FIREBASE_SA_JSON'])
          pid = os.environ['PROJECT_ID']
          rules = open('firestore.rules').read()
          print('SA client_email:', sa.get('client_email'))
          print('Project ID:', pid)

          creds = google.oauth2.service_account.Credentials.from_service_account_info(
              sa, scopes=[
                  'https://www.googleapis.com/auth/cloud-platform',
                  'https://www.googleapis.com/auth/firebase',
              ]
          )

          svc = build('firebaserules', 'v1', credentials=creds)

          # 1. List existing releases to confirm correct name
          rels = svc.projects().releases().list(name='projects/' + pid).execute()
          print('Existing releases:', [r['name'] for r in rels.get('releases', [])])

          # 2. Create new ruleset
          ruleset = svc.projects().rulesets().create(
              name='projects/' + pid,
              body={'source': {'files': [{'name': 'firestore.rules', 'content': rules}]}}
          ).execute()
          ruleset_name = ruleset['name']
          print('Ruleset created:', ruleset_name)

          # 3. Update the cloud.firestore release
          release = svc.projects().releases().patch(
              name='projects/' + pid + '/releases/cloud.firestore',
              body={'name': 'projects/' + pid + '/releases/cloud.firestore',
                    'rulesetName': ruleset_name}
          ).execute()
          print('Release updated:', release.get('name'), '→', release.get('rulesetName'))
          print('Firestore rules deployed successfully.')
          PYEOF

      # Live-Deployment (nur auf main)
      - name: Deploy to live channel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live

      # Preview-Deployment (für Pull Requests / Feature-Branches)
      - name: Deploy to preview channel
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: pr-${{ github.event.number }}
          expires: 7d
