name: Daily Digest Email

on:
  schedule:
    - cron: '0 18 * * *' # Täglich 20:00 MESZ (18:00 UTC)
  workflow_dispatch: # Manuell auslösbar zum Testen

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install firebase-admin
        run: npm install firebase-admin

      - name: Send daily digest
        run: node scripts/send-digest.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
